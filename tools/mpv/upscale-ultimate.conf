################################################################################
#                    ULTIMATE mpv Quality Config (libplacebo)                  #
################################################################################

# Use libplacebo for maximum quality (supports neural network upscaling)
vo=gpu-next
gpu-api=vulkan

# --- libplacebo Advanced Scaling ---
# These use libplacebo's built-in neural network upscalers
# Much better than basic scaling algorithms

# Try these libplacebo scalers (uncomment one at a time to test):

# Option 1: Built-in neural network upscaling (best quality)
scale=ewa_lanczos4sharpest
# Enable libplacebo's built-in upscaling enhancements
libplacebo-upscaler=nnedi3
libplacebo-downscaler=mitchell

# Option 2: Alternative high-quality setup
# scale=spline36
# libplacebo-upscaler=ravu-zoom-r3
# libplacebo-downscaler=ssimdownscaler

# Chroma scaling
cscale=ewa_lanczos

# --- Advanced libplacebo Features ---
# Enable high-quality color processing
libplacebo-color-primaries=auto
libplacebo-color-trc=auto
libplacebo-colorspace=auto
libplacebo-tone-mapping=hable
libplacebo-tone-mapping-mode=hybrid

# Advanced dithering through libplacebo
libplacebo-dithering=blue-noise
libplacebo-dither-lut-size=8

# High-quality debanding
deband=yes
deband-iterations=4
deband-threshold=32
deband-range=20
deband-grain=6

# --- External Shader Support ---
# Download high-quality upscaling shaders and place in ~/.config/mpv/shaders/
# Uncomment these lines after downloading the shaders:

# RAVU neural network upscaler (excellent quality)
# glsl-shaders="~~/shaders/ravu-zoom-ar-r3.hook"

# Anime4K for anime content (great for animated content)
# glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl"
# glsl-shaders-append="~~/shaders/Anime4K_Restore_CNN_VL.glsl"
# glsl-shaders-append="~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"
# glsl-shaders-append="~~/shaders/Anime4K_AutoDownscalePre_x2.glsl"
# glsl-shaders-append="~~/shaders/Anime4K_AutoDownscalePre_x4.glsl"
# glsl-shaders-append="~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

# FSR (FidelityFX Super Resolution)
# glsl-shaders="~~/shaders/FSR.glsl"

# CAS (Contrast Adaptive Sharpening)
# glsl-shaders="~~/shaders/CAS-scaled.glsl"

# --- Hardware Acceleration ---
hwdec=auto-copy
hwdec-codecs=all

# --- Smooth Motion (Optional) ---
# Creates intermediate frames for smoother motion
# Uncomment for 24fps->60fps interpolation:
# video-sync=display-resample
# interpolation=yes
# tscale=oversample

# --- Cache & Buffering ---
cache=yes
demuxer-max-bytes=400M
demuxer-max-back-bytes=150M

# --- Audio Quality ---
audio-channels=auto-safe
audio-exclusive=yes
volume-max=100

# --- Subtitles ---
sub-auto=fuzzy
sub-font-size=52
sub-color="#FFFFFF"
sub-border-color="#000000"
sub-border-size=3.2
sub-shadow-offset=1
sub-shadow-color="#33000000"

# --- Screenshots ---
screenshot-format=png
screenshot-png-compression=8
screenshot-directory="~/Pictures/mpv-screenshots"