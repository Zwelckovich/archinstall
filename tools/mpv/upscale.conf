################################################################################
#                 mpv.conf for High-Quality Upscaling (Working)                #
################################################################################

# Use the most advanced and high-quality video output driver
vo=gpu-next

# Use the Vulkan graphics API for best performance
gpu-api=vulkan

# --- High-Quality Scaling Algorithms (Built-in) ---
# Using only scaling algorithms that are built into mpv

# Luma upscaling - ewa_lanczos4sharpest provides excellent quality for upscaling
# This is one of the highest quality built-in upscaling algorithms
scale=ewa_lanczos4sharpest

# Luma downscaling - mitchell provides good quality when scaling down
# Catmull-rom is also excellent for downscaling
dscale=mitchell

# Chroma scaling - ewa_lanczos provides excellent chroma quality
# This works for both up and downscaling chroma
cscale=ewa_lanczos

# --- Alternative High-Quality Options ---
# Uncomment these if you want to try different scaling algorithms:
#
# For even sharper upscaling (may introduce some artifacts):
# scale=ewa_lanczossharp
#
# For smoother upscaling (less artifacts, softer):
# scale=spline36
#
# For different downscaling:
# dscale=catmull_rom
# dscale=spline36
#
# For different chroma scaling:
# cscale=spline36
# cscale=robidouxsharp

# --- Dithering & Debanding ---
# Smooths out color gradients to prevent "banding" artifacts
deband=yes
deband-iterations=4
deband-threshold=48
deband-range=16
deband-grain=6

# High-quality dithering to prevent color banding
dither-depth=auto
dither=fruit

# --- Temporal Interpolation for Smoother Motion ---
# Creates intermediate frames for smoother motion (24fps -> 60fps)
# Uncomment to enable - can look great but may add "soap opera effect"
#
# tscale=oversample
# video-sync=display-resample
# interpolation=yes

# --- Hardware Decoding ---
# Use GPU for video decoding to free up CPU
hwdec=auto-copy

# --- Additional Quality Settings ---
# Sigmoid upscaling for better quality (works with the scalers above)
sigmoid-upscaling=yes

# Better color space handling
target-colorspace-hint=yes

# High-quality chroma placement (note: chroma-location option may not be available in all builds)
# chroma-location=auto

# Better motion estimation for temporal interpolation
tscale=sphinx

# --- Profile for Maximum Quality ---
# You can also create a profile and activate it with --profile=hq
# Uncomment the following section if you want a profile:
#
# [hq]
# scale=ewa_lanczos4sharpest
# dscale=mitchell  
# cscale=ewa_lanczos
# deband=yes
# sigmoid-upscaling=yes
# dither=fruit