################################################################################
#                    ANIME OPTIMIZED - Maximum Quality Config                  #
################################################################################

# Optimized for animated content (anime, cartoons, etc.)
vo=gpu-next
gpu-api=vulkan

# RAVU Neural Network Upscaler - Excellent for anime
glsl-shaders="/home/zwelch/.config/mpv/shaders/ravu-zoom-ar-r3.hook"

# Additional sharpening for crisp animation lines
glsl-shaders-append="/home/zwelch/.config/mpv/shaders/CAS-scaled.glsl"

# High-quality scaling algorithms
scale=ewa_lanczos4sharpest
dscale=mitchell
cscale=ewa_lanczos

# Advanced debanding for anime (removes color banding)
deband=yes
deband-iterations=4
deband-threshold=32
deband-range=20
deband-grain=6

# High-quality dithering
dither=fruit
dither-depth=auto

# Sigmoid upscaling for better quality
sigmoid-upscaling=yes

# Hardware acceleration
hwdec=auto-copy

# Color processing optimized for animation
target-colorspace-hint=yes

# Cache settings for smooth playback
cache=yes
demuxer-max-bytes=400M

# Optimized for anime subtitles
sub-font-size=52
sub-color="#FFFFFF"
sub-border-color="#000000"
sub-border-size=3.2