# BONSAI Hyprlock Configuration
# Dark Zen Aesthetic

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

# Background with blur effect
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Password input field - BONSAI styled
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(124, 152, 133)          # BONSAI green_primary
    inner_color = rgb(21, 25, 34)             # BONSAI bg_primary
    font_color = rgb(230, 232, 235)           # BONSAI text_primary
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>🌱 Enter Password...</i>
    hide_input = false
    rounding = 12
    check_color = rgb(124, 152, 133)          # BONSAI green_primary
    fail_color = rgb(199, 130, 137)           # BONSAI red_primary
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgb(199, 168, 130)       # BONSAI yellow_primary
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -20
    halign = center
    valign = center
}

# Time display - Large, muted
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(230, 232, 235)                # BONSAI text_primary
    font_size = 96
    font_family = Quicksand
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgb(10, 14, 20)            # BONSAI bg_deep
    shadow_boost = 1.2
}

# Date display - Smaller, muted
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgb(139, 146, 165)                # BONSAI text_muted
    font_size = 24
    font_family = Quicksand
    position = 0, 100
    halign = center
    valign = center
}

# BONSAI branding - subtle
label {
    monitor =
    text = 🌱 BONSAI
    color = rgb(103, 122, 112)                # BONSAI green_muted
    font_size = 14
    font_family = Quicksand
    position = 0, -120
    halign = center
    valign = center
}

# User greeting
label {
    monitor =
    text = Welcome, $USER
    color = rgb(184, 188, 200)                # BONSAI text_secondary
    font_size = 18
    font_family = Quicksand
    position = 0, 50
    halign = center
    valign = center
}
