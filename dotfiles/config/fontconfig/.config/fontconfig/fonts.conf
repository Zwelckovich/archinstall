<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- JetBrainsMono Nerd Font as the default UI font for GTK/Qt/Chromium apps.
       binding="same" (strong) is required — a plain weak <prefer> loses to
       the system generic-family configs (58-dejavu, 60-latin, 65-droid). -->
  <alias binding="same">
    <family>sans-serif</family>
    <prefer><family>JetBrainsMono Nerd Font</family></prefer>
  </alias>
  <!-- Electron/Chromium (VS Code workbench) requests `system-ui` first. -->
  <alias binding="same">
    <family>system-ui</family>
    <prefer><family>JetBrainsMono Nerd Font</family></prefer>
  </alias>

  <!-- VS Code's Linux workbench stack is `system-ui, Ubuntu, Droid Sans,
       sans-serif`. ttf-droid IS installed, so Chromium grabs real Droid Sans
       before reaching the sans-serif remap above. Replace those named UI
       families too so the workbench chrome matches. -->
  <match target="pattern">
    <test qual="any" name="family"><string>Droid Sans</string></test>
    <edit name="family" mode="assign" binding="same"><string>JetBrainsMono Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Ubuntu</string></test>
    <edit name="family" mode="assign" binding="same"><string>JetBrainsMono Nerd Font</string></edit>
  </match>
</fontconfig>
