font_family      "JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0

# vim:ft=kitty

## name:     BONSAI Dark Zen
## author:   BONSAI Design System
## license:  MIT
## blurb:    Minimal, purposeful, beautiful terminal colors

background_opacity 0.75
background_blur 8

# The basic colors
foreground              #e6e8eb
background              #0a0e14
selection_foreground    #0a0e14
selection_background    #7c9885

# Cursor colors
cursor                  #7c9885
cursor_text_color       #0a0e14

# URL underline color when hovering with mouse
url_color               #82a4c7

# Kitty window border colors
active_border_color     #7c9885
inactive_border_color   #2d3441
bell_border_color       #c7a882

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #0a0e14
active_tab_background   #7c9885
inactive_tab_foreground #8b92a5
inactive_tab_background #151922
tab_bar_background      #0a0e14

# Colors for marks (marked text in the terminal)
mark1_foreground #0a0e14
mark1_background #7c9885
mark2_foreground #0a0e14
mark2_background #82a4c7
mark3_foreground #0a0e14
mark3_background #c7a882

# The 16 terminal colors

# black
color0 #151922
color8 #3d4455

# red
color1 #c78289
color9 #d4999f

# green
color2  #7c9885
color10 #9db4a6

# yellow
color3  #c7a882
color11 #d4b99b

# blue
color4  #82a4c7
color12 #9bb5d4

# magenta
color5  #9882c7
color13 #b19cd4

# cyan
color6  #5cc7a8
color14 #7dd4bc

# white
color7  #b8bcc8
color15 #e6e8eb
